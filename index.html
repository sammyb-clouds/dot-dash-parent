<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- iOS Native App Meta Tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dot Dash">
  <title>Dot Dash</title>

  <!-- Embedded Browser Tab Icon (SVG) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23ffffff'/%3E%3Crect x='25' y='25' width='130' height='130' rx='24' fill='none' stroke='%231c1c1e' stroke-width='10'/%3E%3Ccircle cx='65' cy='85' r='15' fill='%231c1c1e'/%3E%3Crect x='93' y='70' width='44' height='30' rx='4' fill='%231c1c1e'/%3E%3Cpath d='M 80 115 Q 90 127 100 115' fill='none' stroke='%231c1c1e' stroke-width='8' stroke-linecap='round'/%3E%3C/svg%3E">
  
  <!-- iOS Home Screen Icon (Requires a PNG or JPG hosted next to this file) -->
  <link rel="apple-touch-icon" href="icon.jpg">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (Compiles React JSX in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- MQTT & SHA256 -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>

  <style>
    /* Prevent web-app elastic scrolling/bouncing on iOS */
    body {
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      /* Lock the body exactly to the viewport to prevent the Safari 100vh height bug */
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
    }
    #root {
      height: 100%;
      width: 100%;
    }
    /* Hide scrollbar for horizontal child selector */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-[#f2f2f7] text-black font-sans selection:bg-blue-200">
  
  <!-- This is where React injects the app -->
  <div id="root"></div>

  <!-- React Application Logic -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Inline SVG Icons ---
    const IconMessageCircle = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>;
    const IconWifi = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>;
    const IconBookOpen = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
    const IconSettings = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
    const IconActivity = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
    const IconVolume2 = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>;
    const IconSend = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
    const IconPlus = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    const IconTrash2 = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
    const IconVideo = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>;
    const IconCheckCircle2 = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const IconAlertCircle = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;

    // --- SHA256 Hashing Utility ---
    async function hashId(message) {
      return window.sha256(message.toLowerCase().trim());
    }

    function App() {
      const [activeTab, setActiveTab] = useState('chat');
      const [client, setClient] = useState(null);
      const [connectionStatus, setConnectionStatus] = useState('Disconnected');
      const [childOnlineStatus, setChildOnlineStatus] = useState({});

      const [parentId, setParentId] = useState('');
      const [children, setChildren] = useState([]);
      const [activeChild, setActiveChild] = useState('');
      
      const [messages, setMessages] = useState([]);
      const isAppActiveRef = useRef(true); 
      
      useEffect(() => {
        setParentId(localStorage.getItem('dotdash_parent') || '');
        const savedChildren = JSON.parse(localStorage.getItem('dotdash_children') || '[]');
        setChildren(savedChildren);
        if (savedChildren.length > 0) setActiveChild(savedChildren[0]);

        if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
          Notification.requestPermission();
        }
        const handleVisibilityChange = () => { isAppActiveRef.current = document.visibilityState === 'visible'; };
        document.addEventListener('visibilitychange', handleVisibilityChange);

        return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
      }, []);

      useEffect(() => {
        if (!parentId) return;

        const connectMqtt = async () => {
          const brokerUrl = 'wss://23a96ac625b148278417e7b320194976.s1.eu.hivemq.cloud:8884/mqtt';
          const hashedParent = await hashId(parentId);
          
          const childHashMap = {};
          for (const c of children) {
            childHashMap[await hashId(c)] = c;
          }

          let isCanvasBlocked = false;
          try {
            const testWs = new WebSocket(brokerUrl);
            testWs.close();
          } catch (err) {
            console.warn("WebSocket blocked by environment. Using Simulated Mode.");
            isCanvasBlocked = true;
          }

          let mqttClient;

          if (isCanvasBlocked) {
            mqttClient = {
              handlers: {},
              on(event, handler) { if (!this.handlers[event]) this.handlers[event] = []; this.handlers[event].push(handler); },
              emit(event, ...args) { if (this.handlers[event]) this.handlers[event].forEach(h => h(...args)); },
              subscribe() {}, publish(topic) {
                const firstHashedChild = Object.keys(childHashMap)[0];
                if (firstHashedChild && topic === `doorbell/msg/${firstHashedChild}`) {
                  const targetName = childHashMap[firstHashedChild];
                  setTimeout(() => { this.emit('message', `doorbell/msg/${hashedParent}`, `TEXT,Hello from ${targetName}!,${targetName}`); }, 1500);
                }
              }, end() {}
            };
            setClient(mqttClient);
            setTimeout(() => { 
              setConnectionStatus('Simulated'); 
              mqttClient.emit('connect'); 
              const firstHash = Object.keys(childHashMap)[0];
              if(firstHash) mqttClient.emit('message', `doorbell/presence/${firstHash}`, "ONLINE"); 
            }, 800);
          } else {
            const options = { username: 'DigitalDoorbell', password: 'Ringring1', clientId: 'parent_ios_' + Math.random().toString(16).substr(2, 8) };
            mqttClient = window.mqtt.connect(brokerUrl, options);
            setClient(mqttClient);

            mqttClient.on('connect', () => {
              setConnectionStatus('Connected');
              mqttClient.subscribe(`doorbell/msg/${hashedParent}`, { qos: 1 });
              Object.keys(childHashMap).forEach(hash => {
                 mqttClient.subscribe(`doorbell/presence/${hash}`);
              });
            });
            mqttClient.on('error', () => setConnectionStatus('Error'));
          }

          const triggerNotification = async (title, body) => {
            try {
              if (window.Capacitor) {
                const { LocalNotifications } = await import('@capacitor/local-notifications');
                let perm = await LocalNotifications.checkPermissions();
                if (perm.display !== 'granted') await LocalNotifications.requestPermissions();
                await LocalNotifications.schedule({ notifications: [{ title, body, id: Date.now(), schedule: { at: new Date(Date.now() + 100) } }] });
              } else if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body });
              }
            } catch (e) {}
          };

          mqttClient.on('message', (topic, message) => {
            const payload = message.toString();
            
            if (topic.startsWith('doorbell/presence/')) {
               const incomingHash = topic.split('/').pop();
               const cId = childHashMap[incomingHash];
               if (cId) {
                  setChildOnlineStatus(prev => ({...prev, [cId]: payload === "ONLINE"}));
               }
            }

            if (topic === `doorbell/msg/${hashedParent}`) {
              if (!payload) return;
              if (!isCanvasBlocked) mqttClient.publish(topic, "", { retain: true });
              const parts = payload.split(',');
              if (parts.length >= 3) {
                const newMsg = {
                  id: Date.now(), type: parts[0], text: parts[1], sender: parts[2], target: parentId, isMe: false,
                  timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                setMessages(prev => [...prev, newMsg]);
                if (!isAppActiveRef.current) {
                   triggerNotification(`Dot Dash from ${newMsg.sender}`, newMsg.type === 'PULSE' ? 'Sent a Buzzer Pulse' : newMsg.text);
                }
              }
            }
          });
        };

        connectMqtt();
        return () => { if (client) client.end(); };
      }, [parentId, children]); 

      return (
        <div className="flex flex-col h-full overflow-hidden">
          <div 
            className="flex-1 flex flex-col px-4 overflow-hidden"
            style={{ paddingTop: 'max(env(safe-area-inset-top), 1rem)' }}
          >
            {activeTab === 'chat' && <ChatView client={client} messages={messages} setMessages={setMessages} parentId={parentId} children={children} activeChild={activeChild} setActiveChild={setActiveChild} childOnlineStatus={childOnlineStatus} connectionStatus={connectionStatus} setActiveTab={setActiveTab} />}
            {activeTab === 'setup' && <div className="h-full overflow-y-auto pb-4"><DeviceSetupView /></div>}
            {activeTab === 'tutorials' && <div className="h-full overflow-y-auto pb-4"><TutorialsView /></div>}
            {activeTab === 'settings' && <div className="h-full overflow-y-auto pb-4"><SettingsView parentId={parentId} setParentId={setParentId} children={children} setChildren={setChildren} activeChild={activeChild} setActiveChild={setActiveChild} /></div>}
          </div>

          <div 
            className="shrink-0 w-full bg-[#f8f8f8]/90 backdrop-blur-md border-t border-gray-300 pt-2 px-6 flex justify-between items-center"
            style={{ paddingBottom: 'max(env(safe-area-inset-bottom), 16px)' }}
          >
            <TabButton icon={<IconMessageCircle className="w-6 h-6"/>} label="Chat" active={activeTab === 'chat'} onClick={() => setActiveTab('chat')} />
            <TabButton icon={<IconWifi className="w-6 h-6"/>} label="Setup" active={activeTab === 'setup'} onClick={() => setActiveTab('setup')} />
            <TabButton icon={<IconBookOpen className="w-6 h-6"/>} label="Tutorials" active={activeTab === 'tutorials'} onClick={() => setActiveTab('tutorials')} />
            <TabButton icon={<IconSettings className="w-6 h-6"/>} label="Settings" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
          </div>
        </div>
      );
    }

    function ChatView({ client, messages, setMessages, parentId, children, activeChild, setActiveChild, childOnlineStatus, connectionStatus, setActiveTab }) {
      const [inputText, setInputText] = useState('');
      const messagesEndRef = useRef(null);

      const activeMessages = messages.filter(m => 
        (m.isMe && m.target === activeChild) || (!m.isMe && m.sender === activeChild)
      );

      useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [activeMessages]);

      const handleSend = async (type = 'MORSE') => {
        if (!client || !parentId || !activeChild) { alert("Please select a child or configure Settings."); setActiveTab('settings'); return; }
        let payload = inputText.trim();
        if (!payload) return;
        
        const hashedChild = await hashId(activeChild);
        const topic = `doorbell/msg/${hashedChild}`;
        const messageString = `${type},${payload},${parentId}`;
        
        client.publish(topic, messageString, { qos: 1, retain: true });
        setMessages(prev => [...prev, {
          id: Date.now(), type: type, text: payload, sender: parentId, target: activeChild, isMe: true,
          timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        }]);
        setInputText('');
      };

      if (!parentId || children.length === 0 || !activeChild) {
        return (
          <div className="flex flex-col items-center justify-center h-full text-center space-y-4">
            <IconActivity className="w-16 h-16 text-gray-400" />
            <h2 className="text-xl font-bold">Welcome to Dot Dash</h2>
            <p className="text-gray-500">Configure your IDs in Settings to start messaging.</p>
            <button onClick={() => setActiveTab('settings')} className="bg-blue-500 text-white px-6 py-3 rounded-xl font-semibold mt-4">Go to Settings</button>
          </div>
        );
      }

      const isOnline = childOnlineStatus[activeChild] || false;

      return (
        <div className="flex flex-col h-full relative">
          
          <div className="shrink-0 flex space-x-3 overflow-x-auto pb-4 pt-2 hide-scrollbar mb-2">
            {children.map(child => {
               const online = childOnlineStatus[child] || false;
               const isActive = activeChild === child;
               return (
                 <button 
                   key={child}
                   onClick={() => setActiveChild(child)}
                   className={`px-5 py-2.5 rounded-full font-bold flex flex-shrink-0 items-center space-x-2 transition-all duration-200 shadow-sm ${isActive ? 'bg-blue-500 text-white' : 'bg-white text-gray-500 border border-gray-100'}`}
                 >
                   <span className={`w-2.5 h-2.5 rounded-full ${online ? (isActive ? 'bg-green-300 shadow-[0_0_6px_#86efac]' : 'bg-green-500 shadow-[0_0_6px_#22c55e]') : (isActive ? 'bg-blue-300' : 'bg-gray-300')}`}></span>
                   <span>{child}</span>
                 </button>
               )
            })}
          </div>

          <div className="flex-1 overflow-y-auto space-y-4 pb-4">
            {activeMessages.length === 0 && <p className="text-center text-gray-400 mt-10">No messages yet with {activeChild}.</p>}
            {activeMessages.map((msg) => (
              <div key={msg.id} className={`flex flex-col ${msg.isMe ? 'items-end' : 'items-start'}`}>
                <div className={`max-w-[80%] rounded-2xl px-4 py-3 ${msg.isMe ? 'bg-blue-500 text-white' : 'bg-white text-black shadow-sm border border-gray-100'}`}>
                  {msg.type === 'PULSE' && <IconVolume2 className="inline mr-2 w-5 h-5" />}
                  {(msg.type === 'MORSE' || msg.type === 'TEXT') && <span>{msg.text}</span>}
                </div>
                <span className="text-xs text-gray-400 mt-1 px-1">{msg.timestamp}</span>
              </div>
            ))}
            <div ref={messagesEndRef} />
          </div>

          <div className="shrink-0 bg-[#f2f2f7] pt-2 pb-2">
            <div className="flex items-center space-x-2 bg-white rounded-full px-4 py-2 shadow-sm border border-gray-200">
              <input type="text" placeholder="Text Message..." value={inputText} onChange={(e) => setInputText(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSend('MORSE')} className="flex-1 outline-none bg-transparent py-1 text-lg" />
              <button onClick={() => handleSend('MORSE')} disabled={!inputText} className="bg-blue-500 text-white p-2 rounded-full disabled:bg-blue-300 flex-shrink-0 transition-opacity">
                <IconSend className="w-5 h-5 ml-0.5" />
              </button>
            </div>
          </div>
        </div>
      );
    }

    function DeviceSetupView() {
      return (
        <div className="space-y-6">
          <h1 className="text-3xl font-bold mb-2">Device Setup</h1>
          
          <div className="bg-white p-6 rounded-3xl shadow-sm space-y-4 border border-gray-100">
            <div className="flex items-center space-x-3 mb-2">
              <div className="flex items-center justify-center w-12 h-12 bg-blue-100 text-blue-500 rounded-full shrink-0">
                 <IconWifi className="w-6 h-6" />
              </div>
              <h2 className="text-xl font-bold">1. Connect to Wi-Fi</h2>
            </div>
            <p className="text-gray-500 leading-relaxed">Turn on your Dot Dash device. Then, go to your iPhone's Wi-Fi settings and connect to the network named <strong>Dot Dash Setup</strong>. If you don't see the network, turn your WiFI off and back on.</p>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm space-y-4 border border-gray-100">
            <div className="flex items-center space-x-3 mb-2">
              <div className="flex items-center justify-center w-12 h-12 bg-blue-100 text-blue-500 rounded-full shrink-0">
                 <IconBookOpen className="w-6 h-6" />
              </div>
              <h2 className="text-xl font-bold">2. Follow the Portal</h2>
            </div>
            <p className="text-gray-500 leading-relaxed">A setup screen should automatically pop up.</p>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm space-y-4 border border-gray-100">
            <div className="flex items-center space-x-3 mb-2">
              <div className="flex items-center justify-center w-12 h-12 bg-blue-100 text-blue-500 rounded-full shrink-0">
                 <IconSettings className="w-6 h-6" />
              </div>
              <h2 className="text-xl font-bold">3. Setup Dot Dash</h2>
            </div>
            <p className="text-gray-500 leading-relaxed">Follow the instructions to enter your home WiFi info, create your username and add friends.</p>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm space-y-4 border border-gray-100">
            <div className="flex items-center space-x-3 mb-2">
              <div className="flex items-center justify-center w-12 h-12 bg-blue-100 text-blue-500 rounded-full shrink-0">
                 <IconSend className="w-6 h-6" />
              </div>
              <h2 className="text-xl font-bold">4. Send Messages!</h2>
            </div>
            <p className="text-gray-500 leading-relaxed">After completing the setup, your Dot Dash will restart and be ready to use!</p>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm space-y-4 border border-gray-100">
            <div className="flex items-center space-x-3 mb-2">
              <div className="flex items-center justify-center w-12 h-12 bg-blue-100 text-blue-500 rounded-full shrink-0">
                 <IconActivity className="w-6 h-6" />
              </div>
              <h2 className="text-xl font-bold">5. Return to Setup</h2>
            </div>
            <p className="text-gray-500 leading-relaxed">You can always return to the setup mode by holding both arcade buttons for 3 seconds. Join the Dot Dash Setup WiFi network to add more friends and change your messages.</p>
          </div>

        </div>
      );
    }

    function TutorialsView() {
      // Restructured to use arrays for clean step-by-step formatting
      const tutorials = [
        { 
          title: "Sending a Quick Message", 
          steps: [
            "Use the front SELECT button to scroll your friend list.",
            "Use the top ENTER button to select that friend.",
            "Use the front SELECT button to scroll message options.",
            "Choose a message and send it using the top ENTER button!"
          ]
        },
        { 
          title: "Morse Typewriter Mode", 
          desc: "Select a friend, then choose 'DOT DASH'.",
          bullets: [
            "Dot: Short tap the front SELECT button.",
            "Dash: Long tap the front SELECT button.",
            "Commit Letter: Tap ENTER.",
            "Add Space: Tap ENTER alone.",
            "Send Message: Long press ENTER."
          ]
        },
        { 
          title: "Playing Arcade Games", 
          steps: [
            "Hold both buttons for 3 seconds to enter setup mode.",
            "Press SELECT, SELECT, ENTER, SELECT, ENTER to go into the Arcade Menu."
          ]
        }
      ];

      // Video configuration
      const videos = [
        {
          id: 1,
          title: "Getting Started & Setup",
          type: "drive", 
          url: "https://drive.google.com/file/d/1ZXEaguX_TlaZChutw_DYpwdNfIs8DHDp/preview",
          poster: "" 
        }
      ];

      return (
        <div className="space-y-6">
          <h1 className="text-3xl font-bold mb-4">Tutorials</h1>
          
          {/* Horizontal Video Scroll Area */}
          <div className="flex space-x-4 overflow-x-auto pb-4 snap-x hide-scrollbar">
            {videos.map(video => (
              <div key={video.id} className="min-w-[280px] h-48 bg-gray-800 rounded-2xl relative snap-center overflow-hidden shadow-md flex-shrink-0 border border-gray-200">
                
                {/* Dynamically render an iframe for Drive, or a video tag for raw MP4s */}
                {video.type === "drive" ? (
                  <iframe 
                    src={video.url} 
                    className="w-full h-full" 
                    frameBorder="0" 
                    allow="autoplay" 
                    allowFullScreen
                  ></iframe>
                ) : (
                  <video 
                    src={video.url} 
                    poster={video.poster} 
                    controls 
                    playsInline 
                    preload="metadata" 
                    className="w-full h-full object-cover" 
                  />
                )}
                
                {/* Video Title Overlay (pointer-events-none allows clicks to pass through to the video play button) */}
                <div className="absolute top-0 left-0 right-0 bg-gradient-to-b from-black/60 to-transparent p-3 pointer-events-none">
                  <span className="text-white font-semibold text-sm drop-shadow-md">{video.title}</span>
                </div>
              </div>
            ))}
          </div>

          {/* Formatted Text Instructions */}
          <div className="space-y-4">
            {tutorials.map((tut, i) => (
              <div key={i} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                <h3 className="font-bold text-lg mb-2">{tut.title}</h3>
                
                {tut.desc && <p className="text-gray-500 mb-3 text-sm">{tut.desc}</p>}
                
                {/* Render Numbered Steps */}
                {tut.steps && (
                  <ol className="list-decimal list-inside text-gray-500 space-y-2 text-sm leading-relaxed">
                    {tut.steps.map((step, j) => <li key={j}>{step}</li>)}
                  </ol>
                )}

                {/* Render Bullet Points (Auto-bolds the text before the colon) */}
                {tut.bullets && (
                  <ul className="text-gray-500 space-y-2 text-sm leading-relaxed">
                    {tut.bullets.map((bullet, j) => {
                      const splitIndex = bullet.indexOf(':');
                      if (splitIndex > -1) {
                        const boldPart = bullet.substring(0, splitIndex + 1);
                        const rest = bullet.substring(splitIndex + 1);
                        return (
                          <li key={j} className="flex items-start">
                            <span className="mr-2 mt-1 text-blue-500 text-xs">●</span>
                            <span><strong className="text-gray-700">{boldPart}</strong>{rest}</span>
                          </li>
                        );
                      }
                      return <li key={j}>• {bullet}</li>;
                    })}
                  </ul>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SettingsView({ parentId, setParentId, children, setChildren, activeChild, setActiveChild }) {
      const [pId, setPId] = useState(parentId);
      const [kids, setKids] = useState([...children]);
      
      if (kids.length === 0) setKids(['']);

      const updateKid = (index, val) => {
        const newKids = [...kids];
        newKids[index] = val;
        setKids(newKids);
      };
      
      const addKid = () => setKids([...kids, '']);
      const removeKid = (index) => setKids(kids.filter((_, i) => i !== index));

      const saveSettings = () => {
        const p = pId.toUpperCase().trim(); 
        const cArray = kids.map(k => k.toUpperCase().trim()).filter(k => k); 
        
        localStorage.setItem('dotdash_parent', p); 
        localStorage.setItem('dotdash_children', JSON.stringify(cArray));
        
        setParentId(p); 
        setChildren(cArray);
        
        if (cArray.length > 0 && !cArray.includes(activeChild)) {
           setActiveChild(cArray[0]);
        }
        alert("Settings Saved!");
      };

      const testNotification = async () => {
        try {
          if ('Notification' in window) {
            const perm = await Notification.requestPermission();
            if (perm === 'granted') new Notification("Dot Dash Test", { body: "Notifications are working!" });
            else alert("Please allow notifications in your device settings.");
          }
        } catch (e) { alert("Notifications not supported."); }
      };

      return (
        <div className="space-y-6">
          <h1 className="text-3xl font-bold mb-4">Settings</h1>
          
          <div className="bg-white rounded-3xl shadow-sm overflow-hidden border border-gray-100">
            <div className="p-5 border-b border-gray-100 bg-gray-50/50">
              <label className="text-xs font-bold text-gray-500 uppercase tracking-wider block mb-2">Your Virtual ID</label>
              <input type="text" placeholder="e.g. MOM0101" className="w-full text-xl outline-none font-semibold uppercase bg-transparent" value={pId} onChange={(e) => setPId(e.target.value)} />
            </div>
            
            <div className="p-5 border-b border-gray-100">
              <label className="text-xs font-bold text-gray-500 uppercase tracking-wider block mb-3">Child IDs</label>
              <div className="space-y-3">
                {kids.map((kid, i) => (
                  <div key={i} className="flex space-x-2">
                    <input 
                      type="text" 
                      placeholder="e.g. ARTHUR0505" 
                      className="flex-1 bg-gray-50 px-4 py-3 rounded-xl outline-none font-semibold uppercase text-lg border border-gray-100 focus:border-blue-300 transition-colors" 
                      value={kid} 
                      onChange={(e) => updateKid(i, e.target.value)} 
                    />
                    <button onClick={() => removeKid(i)} className="p-3 text-red-500 bg-red-50 hover:bg-red-100 rounded-xl transition-colors shrink-0">
                      <IconTrash2 className="w-6 h-6"/>
                    </button>
                  </div>
                ))}
              </div>
              <button onClick={addKid} className="w-full mt-4 py-3 text-blue-500 font-bold flex items-center justify-center bg-blue-50 hover:bg-blue-100 rounded-xl transition-colors">
                 <IconPlus className="w-5 h-5 mr-1"/> Add Child
              </button>
            </div>
            
            <button onClick={saveSettings} className="w-full bg-blue-500 text-white font-bold py-5 active:bg-blue-600 transition-colors">Save Identity</button>
          </div>
          
          <button onClick={testNotification} className="w-full bg-white text-green-600 font-bold py-4 rounded-2xl shadow-sm border border-gray-100 active:bg-gray-50 flex items-center justify-center transition-colors">
            <IconAlertCircle className="w-5 h-5 mr-2" /> Test Notifications
          </button>
        </div>
      );
    }

    function TabButton({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`flex flex-col items-center justify-center w-16 space-y-1 transition-colors ${active ? 'text-blue-500' : 'text-gray-400'}`}>
          <div className={`${active ? 'scale-110' : 'scale-100'} transition-transform duration-200`}>{icon}</div>
          <span className="text-[10px] font-medium">{label}</span>
        </button>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
